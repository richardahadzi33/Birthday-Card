<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPY BIRTHDAY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="front">
            <div class="hover-text">Hover to open</div>
            <div class="cover-shape-large"></div>
            <div class="shape-gold"></div>
            <div class="shape-block"></div>
        </div>

        <div class="card-inside">
            <div class="cake">
                <div class="candle">
                    <div class="flame"></div>
                </div>
                <div class="layer layer-top">
                    <div class="icing"></div>
                    <div class="drip drip1"></div>
                    <div class="drip drip2"></div>
                    <div class="drip drip3"></div>
                </div>
                <div class="layer layer-middle"></div>
                <div class="layer layer-bottom"></div>
            </div>

            <div class="text-container">
                <h2 id="head">Happy Birthday, John Azalekor!</h2>
                <div class="personal-note">
                    <p>Wishing you longevity, prosperity, and happiness!</p>
                    <p>Especially, may God grant you a favor of low temper in all your daily basis to make you a better person in all your dealings with people. Amen 🙏</p>
                </div>
                <p class="footer">Enjoy your special day! 💖</p>
                <p class="signature">— Richard Ahadzi</p>
            </div>
        </div>
    </div>
</body>
</html>
